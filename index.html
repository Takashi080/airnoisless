<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirNOISLESS | AIRBOX</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN (JSXをブラウザで実行するため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;700&display=swap');
        .font-serif { font-family: 'Noto Serif JP', serif; }
        
        /* アニメーション定義 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-fadeIn { animation: fadeIn 1.5s ease-out forwards; }
        .animate-slideUp { animation: slideUp 1s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#f4f4f4] overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                // Lucideアイコンの初期化
                if (window.lucide) {
                    window.lucide.createIcons();
                }
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // スクロール時にアイコンを再描画
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [scrolled]);

            return (
                <div className="min-h-screen font-serif selection:bg-[#f4f4f4] selection:text-[#0a0a0a]">
                    
                    {/* Header Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-1000 ${scrolled ? 'bg-[#0a0a0a]/90 backdrop-blur-md py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-[100rem] mx-auto px-6 md:px-16 flex items-center justify-between">
                            <div className="flex items-baseline space-x-4">
                                <span className="text-2xl md:text-3xl font-bold tracking-[0.4em] uppercase">Airbox</span>
                                <span className="text-[0.6rem] md:text-xs font-sans font-light tracking-[0.5em] text-zinc-500 uppercase">AirNOISLESS</span>
                            </div>
                            <a href="#partner" className="text-[0.6rem] md:text-xs font-sans font-medium tracking-[0.4em] uppercase text-zinc-400 hover:text-white transition-colors">
                                Inquiry
                            </a>
                        </div>
                        <div className={`absolute bottom-0 left-0 w-full h-[0.5px] bg-zinc-800 transition-opacity duration-1000 ${scrolled ? 'opacity-100' : 'opacity-0'}`}></div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative min-h-[100svh] flex flex-col justify-center px-6 md:px-16 overflow-hidden">
                        <div className="absolute top-[-20%] right-[-10%] w-[100vw] h-[100vw] rounded-full bg-[radial-gradient(circle,_rgba(255,255,255,0.03)_0%,_transparent_70%)] -z-10"></div>
                        
                        <div className="max-w-[100rem] mx-auto w-full relative z-10">
                            <div className="max-w-4xl space-y-12 md:space-y-16">
                                <h1 className="text-[10vw] md:text-[6.5vw] font-bold leading-[1.1] tracking-tighter animate-slideUp">
                                    不格好な動作を、<br />
                                    <span className="text-zinc-600 italic font-light tracking-tight">「仕組み」</span>でなくす。
                                </h1>
                                
                                <p className="text-lg md:text-2xl text-zinc-400 leading-relaxed max-w-2xl font-light tracking-widest border-l border-zinc-800 pl-8 animate-fadeIn">
                                    自身の足で泥臭く稼ぐ営業マンの、<br className="hidden md:block" />
                                    「プロとしての尊厳」を守るために。
                                </p>
                            </div>
                        </div>

                        <div className="absolute bottom-12 right-6 md:right-16 flex flex-col items-end space-y-4">
                           <div className="w-[1px] h-32 bg-gradient-to-b from-transparent via-zinc-700 to-transparent"></div>
                        </div>
                    </section>

                    {/* Philosophy Section */}
                    <section className="py-40 md:py-64 px-6 md:px-16 bg-white text-zinc-950">
                        <div className="max-w-4xl mx-auto space-y-24 md:space-y-40">
                            <div className="space-y-16 md:space-y-24 text-2xl md:text-[2.8rem] leading-[1.8] font-light tracking-wider">
                                <p className="text-zinc-400">
                                    お客様との信頼を築き上げ、迎えた契約のクライマックス。<br />
                                    カバンから安っぽいケースを取り出し、置き場にオロオロする。
                                </p>
                                <p className="text-zinc-400">
                                    「探す・落とす・手間取る」<br />
                                    一瞬の不格好さが、積み上げた誠実さを損なわせる。
                                </p>
                                <p className="text-zinc-950">
                                    どんな環境であっても、自信を持ち<br />
                                    「プロとしての尊厳」を保てるように。<br />
                                    洗練された空間を、携帯できる形にして提供する。
                                </p>
                                <p className="text-zinc-950 font-bold border-t border-zinc-200 pt-12">
                                    それが、AirNOISLESSの使命。
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* Partner Section */}
                    <section id="partner" className="py-40 md:py-64 px-6 md:px-16 relative">
                        <div className="max-w-[90rem] mx-auto text-center">
                            <h2 className="text-3xl md:text-5xl font-bold tracking-widest mb-24 md:mb-32">
                                Become a Partner.
                            </h2>

                            <div className="max-w-3xl mx-auto space-y-16 text-left">
                                <p className="text-xl md:text-2xl text-zinc-300 leading-relaxed font-light tracking-widest">
                                    現在、この理念を具現化するプロダクトを開発しています。
                                    確かな技術で「プロの尊厳を守る空間」を共に形にしてくれる革工房・職人様を探しています。
                                </p>

                                <ul className="space-y-8 text-sm md:text-lg text-zinc-500 font-light tracking-widest">
                                    <li className="flex items-center space-x-6">
                                        <div className="w-10 h-[0.5px] bg-zinc-700"></div>
                                        <span>構造設計から共に試行錯誤を楽しめる方</span>
                                    </li>
                                    <li className="flex items-center space-x-6">
                                        <div className="w-10 h-[0.5px] bg-zinc-700"></div>
                                        <span>全国の経営者層へと御社の品質が伝播する戦略に魅力を感じる方</span>
                                    </li>
                                    <li className="flex items-center space-x-6">
                                        <div className="w-10 h-[0.5px] bg-zinc-700"></div>
                                        <span>小ロットのテスト販売から柔軟に対応いただける方</span>
                                    </li>
                                </ul>

                                <div className="pt-20 border-t border-zinc-900 mt-20">
                                   <p className="text-xs tracking-[0.4em] text-zinc-600 uppercase mb-8">Ideation Sketch</p>
                                   <h3 className="text-xl md:text-2xl font-bold mb-6 tracking-widest text-zinc-200">
                                      持ち運べる「契約の舞台」
                                   </h3>
                                   <p className="text-sm md:text-base text-zinc-500 leading-relaxed font-light mb-8 max-w-xl">
                                      A6サイズ手帳型・捺印ツールセット。既存の印鑑ケースが取りこぼす「携帯性」を解決する、開くだけで整然と機能が現れる空間。不格好な要素を消し去り「洗練されたプロの所作」だけを残すツール。<br /><br />
                                      ※上記を皮切りに、現場のノイズを消し去る様々なプロダクト（展開する名刺入れ等）の展開を計画しています。
                                   </p>
                                </div>
                            </div>

                            <div className="mt-32">
                                <a 
                                    href="https://forms.gle/3JPQWh9WforeEzUb7" 
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="group inline-flex flex-col items-center"
                                >
                                    <div className="relative px-12 py-8 md:px-20 md:py-12 mb-6 border border-zinc-800 group-hover:border-zinc-500 transition-all duration-700">
                                        <span className="text-xl md:text-2xl font-bold tracking-[0.5em] block mb-2">PARTNER ENTRY</span>
                                        <span className="text-[0.6rem] md:text-xs font-sans tracking-[0.4em] text-zinc-500 group-hover:text-white transition-colors uppercase">Google Form</span>
                                    </div>
                                    <p className="text-[0.6rem] md:text-[0.7rem] text-zinc-600 tracking-[0.3em] font-light mt-4">
                                        仕様が決まっていなくても構いません。対等な対話を求めています。
                                    </p>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 px-6 md:px-16 border-t border-zinc-900 flex flex-col md:flex-row justify-between items-center text-[0.6rem] md:text-[0.65rem] font-sans font-light tracking-[0.5em] text-zinc-600 uppercase">
                        <div className="flex items-baseline space-x-3 mb-8 md:mb-0">
                            <span className="text-xl font-bold tracking-tighter">Airbox</span>
                            <span>© 2026</span>
                        </div>
                        <div className="flex space-x-12">
                            <a href="#" className="hover:text-white transition-colors">Instagram</a>
                            <a href="#" className="hover:text-white transition-colors">Philosophy</a>
                        </div>
                    </footer>

                    {/* Subtle Noise Texture Overlay */}
                    <div className="fixed inset-0 pointer-events-none opacity-[0.03] bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
